name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Runs only when the "catalog" component (path ".") gets a release —
  # release-please leaves that package's outputs unprefixed since it's
  # the root path. Builds templates.json fresh and attaches it to the
  # GitHub Release that was just created, so
  # /releases/latest/download/templates.json is always the merged
  # output for that exact tagged version.
  publish-catalog:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build catalog
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Verify output is valid JSON
        shell: pwsh
        run: Get-Content templates.json -Raw | ConvertFrom-Json | Out-Null

      - name: Attach templates.json to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" templates.json --clobber
