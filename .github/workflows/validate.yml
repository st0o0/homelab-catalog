name: Validate Catalog

on:
  push:
    branches: [main]
    paths: ["templates/**", "stacks/**"]
  pull_request:
    paths: ["templates/**", "stacks/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate and build catalog
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Verify output is valid JSON
        shell: pwsh
        run: Get-Content templates.json -Raw | ConvertFrom-Json | Out-Null
