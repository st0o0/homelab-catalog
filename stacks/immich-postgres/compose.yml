x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: always
    logging: *default-logging
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_USER=${POSTGRES_USER:-immich}
      - POSTGRES_DB=${POSTGRES_DB:-immich}
      - POSTGRES_INITDB_ARGS=--data-checksums
      - TZ=${TZ:-Europe/Berlin}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - immich-pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-immich} -d ${POSTGRES_DB:-immich}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  immich-pgdata:
