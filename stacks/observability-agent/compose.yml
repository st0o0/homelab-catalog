# Keep container logs from growing unbounded
x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  bifrost:
    image: ghcr.io/st0o0/bifrost:latest
    container_name: obs-agent-bifrost
    restart: unless-stopped
    logging: *default-logging
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # WireGuard identity
      - BIFROST_PRIVATE_KEY=${BIFROST_PRIVATE_KEY:?BIFROST_PRIVATE_KEY is required}
      - BIFROST_ADDRESS=${BIFROST_ADDRESS:-10.13.13.2/32}
      - BIFROST_LISTEN_PORT=${BIFROST_LISTEN_PORT:-0}
      - BIFROST_MTU=${BIFROST_MTU:-1420}
      # Peer (the central observability host)
      - BIFROST_PEER_PUBLIC_KEY=${BIFROST_PEER_PUBLIC_KEY:?BIFROST_PEER_PUBLIC_KEY is required}
      - BIFROST_PEER_ENDPOINT=${BIFROST_PEER_ENDPOINT:?BIFROST_PEER_ENDPOINT is required}
      - BIFROST_PEER_ALLOWED_IPS=${BIFROST_PEER_ALLOWED_IPS:-10.13.13.0/24}
      - BIFROST_PEER_KEEPALIVE=${BIFROST_PEER_KEEPALIVE:-25}
      - BIFROST_PEER_PRESHARED_KEY=${BIFROST_PEER_PRESHARED_KEY:-}
      # Runtime
      - BIFROST_INTERFACE=${BIFROST_INTERFACE:-wg0}
      - BIFROST_CHECK_INTERVAL=${BIFROST_CHECK_INTERVAL:-30}
      - BIFROST_STALE_AFTER=${BIFROST_STALE_AFTER:-135}
      - BIFROST_RESOLVE=${BIFROST_RESOLVE:-on}
      - BIFROST_RECONNECT=${BIFROST_RECONNECT:-on}
      - BIFROST_HEALTHCHECK=${BIFROST_HEALTHCHECK:-on}
      - BIFROST_PROBE=${BIFROST_PROBE:-off}

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: obs-agent-alloy
    restart: unless-stopped
    logging: *default-logging
    # Share the network namespace with Bifrost so all telemetry
    # leaves through the WireGuard tunnel.
    network_mode: service:bifrost
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      - HOST_HOSTNAME=${HOST_HOSTNAME:?HOST_HOSTNAME is required (host label on all metrics/logs)}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-30s}
      - REMOTE_WRITE_URL=${REMOTE_WRITE_URL:-http://10.13.13.1:8428/api/v1/write}
      - LOGS_PUSH_URL=${LOGS_PUSH_URL:-http://10.13.13.1:9428/insert/loki/api/v1/push}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      # Host log files (auth, syslog, kernel)
      - /var/log:/var/log/host:ro
      # Host metrics (node-exporter equivalent built into Alloy)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # Docker container log discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      bifrost:
        condition: service_started

volumes:
  alloy-data:
