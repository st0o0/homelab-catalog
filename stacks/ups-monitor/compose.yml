# Keep container logs from growing unbounded
x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  nut-exporter:
    image: hon95/prometheus-nut-exporter:1.3.1
    container_name: nut-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - HTTP_PORT=9199
      # NUT server (upsd) running on the host
      - NUT_EXPORTER_SERVER=${NUT_SERVER:-host.docker.internal}
      - NUT_EXPORTER_SERVER_PORT=${NUT_PORT:-3493}
      - NUT_EXPORTER_USERNAME=${NUT_USER:-}
      - NUT_EXPORTER_PASSWORD=${NUT_PASSWORD:-}
    ports:
      - "127.0.0.1:9199:9199"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: ups-alloy
    restart: unless-stopped
    logging: *default-logging
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      - HOST_HOSTNAME=${HOST_HOSTNAME:?HOST_HOSTNAME is required}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-30s}
      - REMOTE_WRITE_URL=${REMOTE_WRITE_URL:?REMOTE_WRITE_URL is required}
      - LOGS_PUSH_URL=${LOGS_PUSH_URL:?LOGS_PUSH_URL is required}
      - NUT_EXPORTER_TARGET=${NUT_EXPORTER_TARGET:-nut-exporter:9199}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      # Host log files (auth, syslog, kernel)
      - /var/log:/var/log/host:ro
      # Host metrics (node-exporter equivalent built into Alloy)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # Docker container log discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nut-exporter

volumes:
  alloy-data:
