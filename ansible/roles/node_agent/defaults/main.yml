node_agent_deploy_path: /docker/node-agent
node_agent_hostname: "{{ inventory_hostname }}"
node_agent_tz: Europe/Berlin

# Component toggles
node_agent_alloy_enabled: true
node_agent_hawser_enabled: true
node_agent_bifrost_enabled: false

# Alloy
node_agent_scrape_interval: 30s

# Hawser (Dockhand)
node_agent_dockhand_heartbeat: 30

# Bifrost (WireGuard)
node_agent_bifrost_peer_allowed_ips: 10.13.13.0/24
node_agent_bifrost_peer_keepalive: 25
node_agent_bifrost_peer_preshared_key: ""
node_agent_bifrost_listen_port: 0
node_agent_bifrost_mtu: 1420
