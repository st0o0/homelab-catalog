# Bifrost override — adds WireGuard sidecar and routes
# Alloy + Hawser traffic through the tunnel.
services:
  bifrost:
    image: ghcr.io/st0o0/bifrost:latest
    container_name: node-agent-bifrost
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - BIFROST_PRIVATE_KEY=${BIFROST_PRIVATE_KEY}
      - BIFROST_ADDRESS=${BIFROST_ADDRESS}
      - BIFROST_LISTEN_PORT=${BIFROST_LISTEN_PORT}
      - BIFROST_MTU=${BIFROST_MTU}
      - BIFROST_PEER_PUBLIC_KEY=${BIFROST_PEER_PUBLIC_KEY}
      - BIFROST_PEER_ENDPOINT=${BIFROST_PEER_ENDPOINT}
      - BIFROST_PEER_ALLOWED_IPS=${BIFROST_PEER_ALLOWED_IPS}
      - BIFROST_PEER_KEEPALIVE=${BIFROST_PEER_KEEPALIVE}
      - BIFROST_PEER_PRESHARED_KEY=${BIFROST_PEER_PRESHARED_KEY}
      - BIFROST_INTERFACE=wg0
      - BIFROST_CHECK_INTERVAL=30
      - BIFROST_STALE_AFTER=135
      - BIFROST_RESOLVE=on
      - BIFROST_RECONNECT=on
      - BIFROST_HEALTHCHECK=on
      - BIFROST_PROBE=off

  alloy:
    network_mode: service:bifrost
    depends_on:
      bifrost:
        condition: service_started

  hawser:
    network_mode: service:bifrost
    depends_on:
      bifrost:
        condition: service_started
