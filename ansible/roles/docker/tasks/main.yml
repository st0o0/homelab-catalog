- name: Set dpkg architecture fact
  ansible.builtin.set_fact:
    _docker_dpkg_arch: >-
      {{ 'arm64' if ansible_architecture == 'aarch64'
         else 'amd64' if ansible_architecture == 'x86_64'
         else ansible_architecture }}

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: "{{ docker_apt_key_dest }}"
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ _docker_dpkg_arch }} signed-by={{ docker_apt_key_dest }}]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Remove old Docker packages from distro repos
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent

- name: Install Docker Engine
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Enable and start containerd service
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
