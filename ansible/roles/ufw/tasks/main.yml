- name: Skip if ufw disabled
  ansible.builtin.meta: end_role
  when: not ufw_enabled

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    default: "{{ ufw_default_incoming }}"
  when: not ansible_check_mode

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    default: "{{ ufw_default_outgoing }}"
  when: not ansible_check_mode

- name: Apply default rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ ufw_rules + ufw_extra_rules }}"
  when: not ansible_check_mode

- name: Enable ufw
  community.general.ufw:
    state: enabled
  when: not ansible_check_mode
