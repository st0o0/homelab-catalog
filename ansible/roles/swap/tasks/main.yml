- name: Skip if swap disabled
  ansible.builtin.meta: end_role
  when: not swap_enabled

- name: Check if swapfile exists
  ansible.builtin.stat:
    path: "{{ swap_path }}"
  register: _swap_file

- name: Create swapfile
  ansible.builtin.command:
    cmd: "fallocate -l {{ swap_size }} {{ swap_path }}"
  when: not _swap_file.stat.exists
  changed_when: true

- name: Set swapfile permissions
  ansible.builtin.file:
    path: "{{ swap_path }}"
    mode: "0600"
    owner: root
    group: root

- name: Format swapfile
  ansible.builtin.command:
    cmd: "mkswap {{ swap_path }}"
  when: not _swap_file.stat.exists
  changed_when: true

- name: Enable swapfile
  ansible.builtin.command:
    cmd: "swapon {{ swap_path }}"
  when: not _swap_file.stat.exists
  changed_when: true

- name: Add swapfile to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "{{ swap_path }}"
    line: "{{ swap_path }} none swap sw 0 0"

- name: Set swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
    sysctl_set: true
